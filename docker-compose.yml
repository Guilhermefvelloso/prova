services:

  web:
    build: ./backend
    container_name: prova-web

    ports:
      - "8000:8000"

    depends_on:
      - postgres

  postgres:
    image: postgres:16

    container_name: prova-db

    environment:
      POSTGRES_DB: prova
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123

    ports:
      - "5432:5432"